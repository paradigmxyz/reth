[package]
name = "reth-trie-sparse"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Sparse MPT implementation"

[lints]
workspace = true

[dependencies]
# reth
reth-primitives-traits = { workspace = true, optional = true }
reth-execution-errors.workspace = true
reth-trie-common.workspace = true
tracing = { workspace = true, features = ["attributes"], optional = true }
alloy-trie.workspace = true

# alloy
alloy-primitives.workspace = true

# misc
either = { workspace = true, optional = true }
rayon = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
smallvec = { workspace = true, optional = true }
slotmap = { workspace = true, optional = true }

# metrics
reth-metrics = { workspace = true, optional = true }
metrics = { workspace = true, optional = true }

[dev-dependencies]
reth-primitives-traits = { workspace = true, features = ["arbitrary"] }
reth-trie = { workspace = true, features = ["test-utils"] }
reth-trie-common = { workspace = true, features = ["test-utils", "arbitrary"] }
reth-tracing.workspace = true

arbitrary.workspace = true
alloy-rlp.workspace = true
itertools.workspace = true
pretty_assertions.workspace = true
proptest-arbitrary-interop.workspace = true
proptest.workspace = true
rand.workspace = true
rand_08.workspace = true

[features]
default = ["std", "metrics"]
std = [
    "dep:either",
    "dep:rayon",
    "dep:reth-primitives-traits",
    "dep:smallvec",
    "dep:slotmap",
    "dep:tracing",
    "alloy-primitives/std",
    "alloy-rlp/std",
    "alloy-trie/std",
    "reth-execution-errors/std",
    "reth-primitives-traits/std",
    "reth-primitives-traits/rayon",
    "reth-trie-common/std",
    "tracing/std",
    "serde?/std",
    "serde_json?/std",
    "reth-tracing/std",
    "either/std",
]
metrics = ["dep:reth-metrics", "dep:metrics", "std"]
trie-debug = ["std", "dep:serde", "dep:serde_json", "alloy-primitives/serde", "alloy-trie/serde"]
test-utils = [
    "std",
    "reth-primitives-traits/test-utils",
    "reth-trie-common/test-utils",
    "reth-trie/test-utils",
]
arbitrary = [
    "std",
    "alloy-primitives/arbitrary",
    "alloy-trie/arbitrary",
    "reth-primitives-traits/arbitrary",
    "reth-trie-common/arbitrary",
    "smallvec/arbitrary",
]
