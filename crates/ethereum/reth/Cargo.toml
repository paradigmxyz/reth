[package]
name = "reth-ethereum"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# reth
reth-primitives-traits.workspace = true
reth-chainspec.workspace = true
reth-network = { workspace = true, optional = true }
reth-network-api = { workspace = true, optional = true }
reth-eth-wire = { workspace = true, optional = true }
reth-provider = { workspace = true, optional = true }
reth-db = { workspace = true, optional = true, features = ["mdbx"] }
reth-codecs = { workspace = true, optional = true }
reth-storage-api = { workspace = true, optional = true }
reth-node-api = { workspace = true, optional = true }
reth-node-core = { workspace = true, optional = true }
reth-consensus = { workspace = true, optional = true }
reth-consensus-common = { workspace = true, optional = true }
reth-evm = { workspace = true, optional = true }
reth-transaction-pool = { workspace = true, optional = true }
reth-rpc = { workspace = true, optional = true }
reth-rpc-api = { workspace = true, optional = true }
reth-rpc-eth-types = { workspace = true, optional = true }
reth-rpc-builder = { workspace = true, optional = true }
reth-exex = { workspace = true, optional = true }
reth-trie = { workspace = true, optional = true }
reth-trie-db = { workspace = true, optional = true }
reth-node-builder = { workspace = true, optional = true }
reth-tasks = { workspace = true, optional = true }
reth-cli-util = { workspace = true, optional = true }
reth-engine-local = { workspace = true, optional = true }

# reth-ethereum
reth-ethereum-primitives.workspace = true
reth-ethereum-cli = { workspace = true, optional = true }
reth-ethereum-consensus = { workspace = true, optional = true }
reth-evm-ethereum = { workspace = true, optional = true }
reth-node-ethereum = { workspace = true, optional = true }

# alloy
alloy-rpc-types-eth = { workspace = true, optional = true }
alloy-rpc-types-engine = { workspace = true, optional = true }

[features]
default = ["std"]
std = [
    "reth-chainspec/std",
    "reth-ethereum-primitives/std",
    "reth-ethereum-consensus?/std",
    "reth-primitives-traits/std",
    "reth-consensus?/std",
    "reth-consensus-common?/std",
    "alloy-rpc-types-eth?/std",
    "reth-storage-api?/std",
    "reth-evm?/std",
    "reth-evm-ethereum?/std",
    "alloy-rpc-types-engine?/std",
    "reth-codecs?/std",
]
arbitrary = [
    "std",
    "reth-chainspec/arbitrary",
    "reth-ethereum-primitives/arbitrary",
    "reth-primitives-traits/arbitrary",
    "reth-db?/arbitrary",
    "alloy-rpc-types-eth?/arbitrary",
    "reth-transaction-pool?/arbitrary",
    "reth-eth-wire?/arbitrary",
    "alloy-rpc-types-engine?/arbitrary",
    "reth-codecs?/arbitrary",
]
asm-keccak = [
    "reth-ethereum-cli?/asm-keccak",
    "reth-node-ethereum?/asm-keccak",
    "reth-node-core?/asm-keccak",
    "reth-evm?/asm-keccak",
    "reth-evm-ethereum?/asm-keccak",
    "reth-storage-api?/asm-keccak",
]
secp256k1 = [
    "reth-ethereum-cli?/secp256k1",
    "reth-node-ethereum?/secp256k1",
    "reth-node-core?/secp256k1",
    "reth-evm?/secp256k1",
    "reth-evm-ethereum?/secp256k1",
    "reth-storage-api?/secp256k1",
    "reth-primitives-traits/secp256k1",
]
gmp = [
    "reth-ethereum-cli?/gmp",
    "reth-node-ethereum?/gmp",
    "reth-node-core?/gmp",
    "reth-evm?/gmp",
    "reth-evm-ethereum?/gmp",
    "reth-storage-api?/gmp",
]
bn = [
    "reth-ethereum-cli?/bn",
    "reth-node-ethereum?/bn",
    "reth-node-core?/bn",
    "reth-evm?/bn",
    "reth-evm-ethereum?/bn",
    "reth-storage-api?/bn",
]
c-kzg = [
    "reth-ethereum-cli?/c-kzg",
    "reth-node-ethereum?/c-kzg",
    "reth-node-core?/c-kzg",
    "reth-evm?/c-kzg",
    "reth-evm-ethereum?/c-kzg",
    "reth-storage-api?/c-kzg",
]
blst = [
    "reth-ethereum-cli?/blst",
    "reth-node-ethereum?/blst",
    "reth-node-core?/blst",
    "reth-evm?/blst",
    "reth-evm-ethereum?/blst",
    "reth-storage-api?/blst",
]
bn254-mcl = [
    "reth-ethereum-cli?/bn254-mcl",
    "reth-node-ethereum?/bn254-mcl",
    "reth-node-core?/bn254-mcl",
    "reth-evm?/bn254-mcl",
    "reth-evm-ethereum?/bn254-mcl",
    "reth-storage-api?/bn254-mcl",
]
p256-aws-lc-rs = [
    "reth-ethereum-cli?/p256-aws-lc-rs",
    "reth-node-ethereum?/p256-aws-lc-rs",
    "reth-node-core?/p256-aws-lc-rs",
    "reth-evm?/p256-aws-lc-rs",
    "reth-evm-ethereum?/p256-aws-lc-rs",
    "reth-storage-api?/p256-aws-lc-rs",
]
parse = [
    "reth-ethereum-cli?/parse",
    "reth-node-ethereum?/parse",
    "reth-node-core?/parse",
    "reth-evm?/parse",
    "reth-evm-ethereum?/parse",
    "reth-storage-api?/parse",
]
keccak-cache-global = [
    "reth-node-ethereum?/keccak-cache-global",
    "reth-node-core?/keccak-cache-global",
]
test-utils = [
    "reth-chainspec/test-utils",
    "reth-consensus?/test-utils",
    "reth-db?/test-utils",
    "reth-ethereum-primitives/test-utils",
    "reth-evm?/test-utils",
    "reth-network?/test-utils",
    "reth-node-ethereum?/test-utils",
    "reth-primitives-traits/test-utils",
    "reth-provider?/test-utils",
    "reth-trie?/test-utils",
    "reth-transaction-pool?/test-utils",
    "reth-evm-ethereum?/test-utils",
    "reth-node-builder?/test-utils",
    "reth-trie-db?/test-utils",
    "reth-codecs?/test-utils",
    "reth-tasks?/test-utils",
]

full = [
    "consensus",
    "evm",
    "node",
    "provider",
    "rpc",
    "exex",
    "trie",
    "pool",
    "network",
]

cli = ["dep:reth-ethereum-cli", "dep:reth-cli-util"]
consensus = [
    "dep:reth-consensus",
    "dep:reth-consensus-common",
    "dep:reth-ethereum-consensus",
]
evm = ["dep:reth-evm", "dep:reth-evm-ethereum"]
exex = ["provider", "dep:reth-exex"]
node-api = ["dep:reth-node-api", "dep:reth-node-core"]
node = [
    "provider",
    "consensus",
    "evm",
    "network",
    "node-api",
    "dep:reth-node-ethereum",
    "dep:reth-node-builder",
    "dep:reth-engine-local",
    "rpc",
    "trie-db",
    "pool",
]
pool = ["dep:reth-transaction-pool"]
rpc = [
    "tasks",
    "dep:reth-rpc",
    "dep:reth-rpc-builder",
    "dep:reth-rpc-api",
    "dep:reth-rpc-eth-types",
    "dep:alloy-rpc-types-eth",
    "dep:alloy-rpc-types-engine",
]
tasks = ["dep:reth-tasks"]
jemalloc = [
    "reth-cli-util?/jemalloc",
    "reth-ethereum-cli?/jemalloc",
    "reth-node-core?/jemalloc",
    "reth-provider?/jemalloc",
]
jemalloc-prof = [
    "jemalloc",
    "reth-cli-util?/jemalloc-prof",
    "reth-ethereum-cli?/jemalloc-prof",
]
jemalloc-symbols = [
    "jemalloc-prof",
    "reth-ethereum-cli?/jemalloc-symbols",
]
jit = ["reth-node-ethereum?/jit"]
js-tracer = [
    "rpc",
    "reth-rpc/js-tracer",
    "reth-node-builder?/js-tracer",
    "reth-node-ethereum?/js-tracer",
    "reth-rpc-eth-types?/js-tracer",
]
network = ["dep:reth-network", "tasks", "dep:reth-network-api", "dep:reth-eth-wire"]
otlp = [
    "reth-ethereum-cli?/otlp",
    "reth-node-core?/otlp",
]
portable = [
    "reth-ethereum-cli?/portable",
    "reth-node-ethereum?/portable",
    "reth-node-core?/portable",
    "reth-evm?/portable",
    "reth-evm-ethereum?/portable",
    "reth-storage-api?/portable",
]
provider = ["storage-api", "tasks", "dep:reth-provider", "dep:reth-db", "dep:reth-codecs"]
storage-api = ["dep:reth-storage-api"]
trie = ["dep:reth-trie"]
trie-db = ["trie", "dep:reth-trie-db"]
