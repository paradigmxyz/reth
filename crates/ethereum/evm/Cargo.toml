[package]
name = "reth-evm-ethereum"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# Reth
reth-execution-types.workspace = true
reth-chainspec.workspace = true
reth-ethereum-forks.workspace = true
reth-primitives-traits.workspace = true
reth-ethereum-primitives.workspace = true
reth-evm.workspace = true
reth-storage-errors = { workspace = true, optional = true }
reth-storage-api = { workspace = true, optional = true }
evm2.workspace = true

# Alloy
alloy-primitives.workspace = true
alloy-eips.workspace = true
alloy-consensus.workspace = true
alloy-rpc-types-engine.workspace = true
alloy-sol-types.workspace = true

metrics = { workspace = true, optional = true }
reth-metrics = { workspace = true, optional = true }

[dev-dependencies]
reth-testing-utils.workspace = true
reth-evm = { workspace = true, features = ["test-utils"] }
secp256k1.workspace = true
alloy-genesis.workspace = true

[features]
default = ["std"]
asm-keccak = [
    "evm2/asm-keccak",
    "reth-evm/asm-keccak",
    "reth-execution-types/asm-keccak",
    "reth-storage-api?/asm-keccak",
    "alloy-primitives/asm-keccak",
]
secp256k1 = [
    "evm2/secp256k1",
    "reth-evm/secp256k1",
    "reth-execution-types/secp256k1",
    "reth-storage-api?/secp256k1",
    "reth-primitives-traits/secp256k1",
    "alloy-consensus/secp256k1",
    "alloy-primitives/secp256k1",
]
gmp = [
    "evm2/gmp",
    "reth-evm/gmp",
    "reth-execution-types/gmp",
    "reth-storage-api?/gmp",
]
bn = [
    "evm2/bn",
    "reth-evm/bn",
    "reth-execution-types/bn",
    "reth-storage-api?/bn",
]
c-kzg = [
    "evm2/c-kzg",
    "reth-evm/c-kzg",
    "reth-execution-types/c-kzg",
    "reth-storage-api?/c-kzg",
]
blst = [
    "evm2/blst",
    "reth-evm/blst",
    "reth-execution-types/blst",
    "reth-storage-api?/blst",
]
bn254-mcl = [
    "evm2/bn254-mcl",
    "reth-evm/bn254-mcl",
    "reth-execution-types/bn254-mcl",
    "reth-storage-api?/bn254-mcl",
]
portable = [
    "evm2/portable",
    "reth-evm/portable",
    "reth-execution-types/portable",
    "reth-storage-api?/portable",
]
p256-aws-lc-rs = [
    "evm2/p256-aws-lc-rs",
    "reth-evm/p256-aws-lc-rs",
    "reth-execution-types/p256-aws-lc-rs",
    "reth-storage-api?/p256-aws-lc-rs",
]
parse = [
    "evm2/parse",
    "reth-evm/parse",
    "reth-execution-types/parse",
    "reth-storage-api?/parse",
]
std = [
    "alloy-consensus/std",
    "alloy-eips/std",
    "alloy-genesis/std",
    "alloy-primitives/std",
    "secp256k1/std",
    "reth-ethereum-forks/std",
    "reth-chainspec/std",
    "evm2/std",
    "reth-execution-types/std",
    "reth-evm/std",
    "reth-primitives-traits/std",
    "reth-ethereum-primitives/std",
    "alloy-rpc-types-engine/std",
    "dep:reth-storage-errors",
    "reth-storage-errors/std",
    "dep:reth-storage-api",
    "reth-storage-api/std",
    "alloy-sol-types/std",
]
test-utils = [
    "std",
    "reth-chainspec/test-utils",
    "reth-ethereum-primitives/test-utils",
    "reth-evm/test-utils",
    "reth-primitives-traits/test-utils",
]
