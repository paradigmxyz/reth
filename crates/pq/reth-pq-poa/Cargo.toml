[package]
name = "reth-pq-poa"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Proof of Authority consensus engine for PQ-EVM using ML-DSA-65"

[lints]
workspace = true

[dependencies]
# PQ crypto
dilithium.workspace = true
hybrid-array = { version = "0.4", features = ["extra-sizes"] }
typenum = "1"
# Hashing (SHAKE-256 for header hash)
sha3 = "0.11"
# reth consensus
reth-consensus = { workspace = true }
reth-execution-types = { workspace = true }
reth-primitives-traits = { workspace = true }
alloy-consensus = { workspace = true }
alloy-primitives = { workspace = true }
alloy-rlp = { workspace = true }
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
# Async runtime
tokio = { version = "1", features = ["time", "sync", "macros", "rt"] }
futures-util = "0.3"
# Logging
tracing = "0.1"
# Errors
eyre = "0.6"
thiserror = "2"