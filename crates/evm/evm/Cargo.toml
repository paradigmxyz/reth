[package]
name = "reth-evm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# reth
reth-execution-errors.workspace = true
reth-execution-types.workspace = true
reth-metrics = { workspace = true, optional = true }
reth-primitives-traits.workspace = true
reth-storage-api.workspace = true
reth-storage-errors.workspace = true
reth-trie-common.workspace = true
reth-trie = { workspace = true, optional = true }

revm.workspace = true
revm-bytecode.workspace = true
evm2.workspace = true

# alloy
alloy-primitives.workspace = true
alloy-eip7928.workspace = true
alloy-eips.workspace = true
alloy-evm.workspace = true
alloy-consensus.workspace = true
alloy-rlp = { workspace = true, optional = true }
alloy-rpc-types-debug = { workspace = true, optional = true }

auto_impl.workspace = true
derive_more.workspace = true
futures-util.workspace = true
metrics = { workspace = true, optional = true }
rayon = { workspace = true, optional = true }
thiserror.workspace = true

[dev-dependencies]
reth-ethereum-primitives.workspace = true

[features]
default = ["std"]
std = [
    "dep:rayon",
    "reth-primitives-traits/std",
    "alloy-eips/std",
    "alloy-primitives/std",
    "alloy-consensus/std",
    "revm/std",
    "revm-bytecode/std",
    "evm2/std",
    "alloy-evm/std",
    "reth-execution-errors/std",
    "reth-execution-types/std",
    "reth-storage-errors/std",
    "futures-util/std",
    "derive_more/std",
    "reth-storage-api/std",
    "reth-trie-common/std",
    "reth-ethereum-primitives/std",
    "alloy-eip7928/std",
    "thiserror/std",
    "alloy-rlp?/std",
]
asm-keccak = [
    "alloy-primitives/asm-keccak",
    "evm2/asm-keccak",
    "revm/asm-keccak",
    "alloy-evm/asm-keccak",
]
blst = ["evm2/blst", "revm/blst"]
c-kzg = ["evm2/c-kzg", "revm/c-kzg"]
memory_limit = ["revm/memory_limit"]
metrics = ["std", "dep:metrics", "dep:reth-metrics"]
optional-balance-check = ["revm/optional_balance_check"]
optional-block-gas-limit = ["revm/optional_block_gas_limit"]
optional-eip3541 = ["revm/optional_eip3541"]
optional-eip3607 = ["revm/optional_eip3607"]
optional-fee-charge = ["revm/optional_fee_charge"]
optional-no-base-fee = ["revm/optional_no_base_fee"]
p256-aws-lc-rs = ["evm2/p256-aws-lc-rs", "revm/p256-aws-lc-rs"]
portable = ["evm2/portable", "revm/portable"]
rpc = ["alloy-evm/call-util", "alloy-evm/overrides", "alloy-evm/rpc"]
secp256k1 = [
    "evm2/secp256k1",
    "revm/secp256k1",
    "alloy-consensus/secp256k1",
    "alloy-evm/secp256k1",
    "alloy-primitives/secp256k1",
    "reth-primitives-traits/secp256k1",
]
test-utils = [
    "reth-primitives-traits/test-utils",
    "reth-trie-common/test-utils",
    "reth-ethereum-primitives/test-utils",
    "reth-trie?/test-utils",
]
witness = ["dep:reth-trie", "dep:alloy-rlp", "dep:alloy-rpc-types-debug"]
