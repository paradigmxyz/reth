[package]
name = "reth-tracing"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "tracing helpers"

[lints]
workspace = true

[dependencies]
# reth
reth-tracing-otlp = { workspace = true, optional = true }

# obs
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt", "ansi", "json"], optional = true }
tracing-appender = { workspace = true, optional = true }
tracing-chrome = { workspace = true, optional = true }
tracing-journald = { workspace = true, optional = true }
tracing-logfmt = { workspace = true, optional = true }
tracing-samply = { workspace = true, optional = true }
tracing-tracy = { workspace = true, optional = true }
tracy-client = { workspace = true, optional = true }

# misc
clap = { workspace = true, features = ["derive"], optional = true }
eyre = { workspace = true, optional = true }
rolling-file = { workspace = true, optional = true }

[features]
default = ["std", "otlp"]
std = [
    "tracing-subscriber",
    "tracing-appender",
    "tracing-chrome",
    "tracing-journald",
    "tracing-logfmt",
    "tracing-samply",
    "clap",
    "eyre",
    "rolling-file",
    "tracing/std",
    "tracing-subscriber?/std",
]
otlp = ["reth-tracing-otlp"]
otlp-logs = ["reth-tracing-otlp/otlp-logs"]
tracy = ["tracing-tracy", "tracy-client"]
