[package]
name = "reth-bb"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Reth node configured for big block payload execution"

[lints]
workspace = true

[dependencies]
# reth
reth-ethereum-cli.workspace = true
reth-chainspec.workspace = true
reth-ethereum-primitives.workspace = true
reth-cli-util.workspace = true
reth-node-core.workspace = true
reth-node-ethereum.workspace = true
reth-node-builder.workspace = true
reth-node-api.workspace = true
reth-ethereum-consensus.workspace = true
reth-engine-primitives = { workspace = true, features = ["std"] }
reth-engine-tree.workspace = true
reth-primitives-traits.workspace = true
reth-payload-primitives.workspace = true
reth-provider.workspace = true
reth-rpc-api.workspace = true
reth-rpc-engine-api.workspace = true
reth-evm.workspace = true
reth-evm-ethereum.workspace = true
reth-ethereum-forks.workspace = true
reth-consensus.workspace = true
reth-chain-state.workspace = true
reth-errors.workspace = true
reth-storage-errors.workspace = true
reth-storage-api.workspace = true

# alloy
alloy-rpc-types = { workspace = true, features = ["engine"] }
alloy-primitives.workspace = true
alloy-rlp.workspace = true
alloy-consensus.workspace = true
alloy-eips.workspace = true

# tracing
tracing.workspace = true

# misc
clap = { workspace = true, features = ["derive", "env"] }
jsonrpsee = { workspace = true, features = ["server", "macros"] }
async-trait.workspace = true
derive_more.workspace = true
crossbeam-channel.workspace = true
tokio = { workspace = true, features = ["sync"] }
alloy-hardforks.workspace = true
metrics.workspace = true
evm2.workspace = true

# std
eyre.workspace = true

[features]
default = [
    "jemalloc",
    "reth-cli-util/jemalloc",
    "asm-keccak",
    "keccak-cache-global",
    "min-trace-logs",
    "otlp",
    "otlp-logs",
    "js-tracer",
]

otlp = [
    "reth-ethereum-cli/otlp",
    "reth-node-core/otlp",
]
otlp-logs = [
    "reth-ethereum-cli/otlp-logs",
    "reth-node-core/otlp-logs",
]
js-tracer = [
    "reth-node-builder/js-tracer",
    "reth-node-ethereum/js-tracer",
]

jemalloc = [
    "reth-cli-util/jemalloc",
    "reth-node-core/jemalloc",
    "reth-ethereum-cli/jemalloc",
    "reth-provider/jemalloc",
]

asm-keccak = [
    "reth-node-core/asm-keccak",
    "reth-ethereum-cli/asm-keccak",
    "reth-node-ethereum/asm-keccak",
    "reth-engine-tree/asm-keccak",
    "reth-evm/asm-keccak",
    "reth-evm-ethereum/asm-keccak",
    "reth-storage-api/asm-keccak",
    "alloy-primitives/asm-keccak",
    "evm2/asm-keccak",
]
secp256k1 = [
    "reth-node-core/secp256k1",
    "reth-ethereum-cli/secp256k1",
    "reth-node-ethereum/secp256k1",
    "reth-engine-tree/secp256k1",
    "reth-evm/secp256k1",
    "reth-evm-ethereum/secp256k1",
    "reth-storage-api/secp256k1",
    "evm2/secp256k1",
    "reth-primitives-traits/secp256k1",
    "alloy-consensus/secp256k1",
    "alloy-primitives/secp256k1",
]
gmp = [
    "reth-node-core/gmp",
    "reth-ethereum-cli/gmp",
    "reth-node-ethereum/gmp",
    "reth-engine-tree/gmp",
    "reth-evm/gmp",
    "reth-evm-ethereum/gmp",
    "reth-storage-api/gmp",
    "evm2/gmp",
]
bn = [
    "reth-node-core/bn",
    "reth-ethereum-cli/bn",
    "reth-node-ethereum/bn",
    "reth-engine-tree/bn",
    "reth-evm/bn",
    "reth-evm-ethereum/bn",
    "reth-storage-api/bn",
    "evm2/bn",
]
c-kzg = [
    "reth-node-core/c-kzg",
    "reth-ethereum-cli/c-kzg",
    "reth-node-ethereum/c-kzg",
    "reth-engine-tree/c-kzg",
    "reth-evm/c-kzg",
    "reth-evm-ethereum/c-kzg",
    "reth-storage-api/c-kzg",
    "evm2/c-kzg",
]
blst = [
    "reth-node-core/blst",
    "reth-ethereum-cli/blst",
    "reth-node-ethereum/blst",
    "reth-engine-tree/blst",
    "reth-evm/blst",
    "reth-evm-ethereum/blst",
    "reth-storage-api/blst",
    "evm2/blst",
]
bn254-mcl = [
    "reth-node-core/bn254-mcl",
    "reth-ethereum-cli/bn254-mcl",
    "reth-node-ethereum/bn254-mcl",
    "reth-engine-tree/bn254-mcl",
    "reth-evm/bn254-mcl",
    "reth-evm-ethereum/bn254-mcl",
    "reth-storage-api/bn254-mcl",
    "evm2/bn254-mcl",
]
portable = [
    "reth-node-core/portable",
    "reth-ethereum-cli/portable",
    "reth-node-ethereum/portable",
    "reth-engine-tree/portable",
    "reth-evm/portable",
    "reth-evm-ethereum/portable",
    "reth-storage-api/portable",
    "evm2/portable",
]
p256-aws-lc-rs = [
    "reth-node-core/p256-aws-lc-rs",
    "reth-ethereum-cli/p256-aws-lc-rs",
    "reth-node-ethereum/p256-aws-lc-rs",
    "reth-engine-tree/p256-aws-lc-rs",
    "reth-evm/p256-aws-lc-rs",
    "reth-evm-ethereum/p256-aws-lc-rs",
    "reth-storage-api/p256-aws-lc-rs",
    "evm2/p256-aws-lc-rs",
]
parse = [
    "reth-node-core/parse",
    "reth-ethereum-cli/parse",
    "reth-node-ethereum/parse",
    "reth-engine-tree/parse",
    "reth-evm/parse",
    "reth-evm-ethereum/parse",
    "reth-storage-api/parse",
    "evm2/parse",
]

keccak-cache-global = [
    "reth-node-core/keccak-cache-global",
    "reth-node-ethereum/keccak-cache-global",
    "alloy-primitives/keccak-cache-global",
]

min-debug-logs = [
    "tracing/release_max_level_debug",
    "reth-ethereum-cli/min-debug-logs",
    "reth-node-core/min-debug-logs",
]
min-trace-logs = [
    "tracing/release_max_level_trace",
    "reth-ethereum-cli/min-trace-logs",
    "reth-node-core/min-trace-logs",
]

[[bin]]
name = "reth-bb"
path = "src/main.rs"
