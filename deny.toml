# This section is considered when running `cargo deny check advisories`
# More documentation for the advisories section can be found here:
# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
yanked = "warn"
ignore = [
    # https://rustsec.org/advisories/RUSTSEC-2024-0384 used by sse example
    "RUSTSEC-2024-0384",
    # https://rustsec.org/advisories/RUSTSEC-2024-0436 paste! is unmaintained
    "RUSTSEC-2024-0436",
    # pre-existing transitive dependency advisories
    # https://rustsec.org/advisories/RUSTSEC-2025-0141
    # bincode (1.x) is unmaintained; no upstream replacement available that is
    # compatible with our current usage. Tracked for future migration.
    "RUSTSEC-2025-0141",
    # https://rustsec.org/advisories/RUSTSEC-2026-0049
    # rustls-webpki: CRL matching logic flaw; fixed in 0.103.x >= 0.103.10.
    # Current: 0.103.8. Blocked by transitive dep pin; fix when upstream allows.
    "RUSTSEC-2026-0049",
    # https://rustsec.org/advisories/RUSTSEC-2026-0067
    # tar: symlink-following allows writes outside extraction root (CVSS 5.1).
    # Only affects archive extraction paths; reth does not extract user-supplied
    # tar archives. Fixed in tar >= 0.4.45 (current: 0.4.44).
    "RUSTSEC-2026-0067",
    # https://rustsec.org/advisories/RUSTSEC-2026-0068
    # tar: PAX size header parsing inconsistency (CVSS 5.1).
    # Same crate and rationale as above. Fixed in tar >= 0.4.45 (current: 0.4.44).
    "RUSTSEC-2026-0068",
    # https://rustsec.org/advisories/RUSTSEC-2026-0009
    # time: RFC 2822 parser stack overflow DoS (CVSS 6.8).
    # reth does not parse untrusted RFC 2822 dates; this is a dev/test
    # dependency path. Fixed in time >= 0.3.47 (current: 0.3.44).
    "RUSTSEC-2026-0009",
]

# This section is considered when running `cargo deny check bans`.
# More documentation about the 'bans' section can be found here:
# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`
wildcards = "allow"
highlight = "all"
# List of crates to deny
deny = [{ name = "openssl" }]
# Certain crates/versions that will be skipped when doing duplicate detection.
skip = []
# Similarly to `skip` allows you to skip certain crates during duplicate
# detection. Unlike skip, it also includes the entire tree of transitive
# dependencies starting at the specified crate, up to a certain depth, which is
# by default infinite
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.8

# List of explicitly allowed licenses
# See https://spdx.org/licenses/ for list of possible licenses
# [possible values: any SPDX 3.7 short identifier (+ optional exception)].
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "0BSD",
    "CC0-1.0",
    "ISC",
    "Unlicense",
    "Unicode-3.0",
    "Zlib",
    # https://github.com/rustls/webpki/blob/main/LICENSE ISC Style
    "LicenseRef-rustls-webpki",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]

# Allow 1 or more licenses on a per-crate basis, so that particular licenses
# aren't accepted for every possible crate as with the normal allow list
exceptions = [
    # TODO: decide on MPL-2.0 handling
    # These dependencies are grandfathered in https://github.com/paradigmxyz/reth/pull/6980
    { allow = ["MPL-2.0"], name = "option-ext" },
    { allow = ["MPL-2.0"], name = "webpki-root-certs" },
]

[[licenses.clarify]]
name = "rustls-webpki"
expression = "LicenseRef-rustls-webpki"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# This section is considered when running `cargo deny check sources`.
# More documentation about the 'sources' section can be found here:
# https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
[sources]
# Lint level for what to happen when a crate from a crate registry that is not
# in the allow list is encountered
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "deny"
allow-git = [
    # TODO: Please avoid adding new entries to this list.
    "https://github.com/alloy-rs/alloy",
    "https://github.com/foundry-rs/block-explorers",
    "https://github.com/bluealloy/revm",
    "https://github.com/paradigmxyz/revm-inspectors",
    "https://github.com/alloy-rs/evm",
    "https://github.com/alloy-rs/hardforks",
    "https://github.com/paradigmxyz/jsonrpsee",
    # mantle-xyz forks of upstream crates
    "https://github.com/mantle-xyz/revm",
    "https://github.com/mantle-xyz/revm-inspectors",
    "https://github.com/mantle-xyz/evm",
    "https://github.com/mantle-xyz/op-alloy",
]
