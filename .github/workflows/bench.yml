# Runs benchmarks.
#
# The reth-bench job replays real blocks via the Engine API against a reth node
# backed by a local snapshot managed with schelk.
#
# It runs the baseline binary and the feature (candidate) binary on the
# same block range (snapshot recovered between runs) to compare performance.

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      blocks:
        description: "Number of blocks to benchmark"
        required: false
        default: "500"
        type: string
      big_blocks:
        description: "Use big blocks mode (pre-generated merged payloads with reth-bb)"
        required: false
        default: "false"
        type: boolean
      bal:
        description: "Replay block access lists during big-block benchmarks"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
          - "feature"
          - "baseline"
      warmup:
        description: "Number of warmup blocks"
        required: false
        default: "200"
        type: string
      baseline:
        description: "Baseline git ref (default: merge-base)"
        required: false
        default: ""
        type: string
      feature:
        description: "Feature git ref (default: branch head)"
        required: false
        default: ""
        type: string
      wait_time:
        description: "Minimum interval between block submissions (e.g. 500ms, 1s)"
        required: false
        default: ""
        type: string
      baseline_args:
        description: "Extra CLI args for the baseline reth node"
        required: false
        default: ""
        type: string
      feature_args:
        description: "Extra CLI args for the feature reth node"
        required: false
        default: ""
        type: string
      samply:
        description: "Enable samply profiling"
        required: false
        default: "false"
        type: boolean
      cores:
        description: "Limit reth to N CPU cores (0 = all available)"
        required: false
        default: "0"
        type: string
      slack:
        description: "Slack notification policy"
        required: false
        default: "never"
        type: choice
        options:
          - always
          - on-win
          - on-error
          - never
      abba:
        description: "Run ABBA (FBBF) interleaved order; false = single FB pass"
        required: false
        default: "true"
        type: boolean
      otlp:
        description: "Export OTLP traces and logs"
        required: false
        default: "true"
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"
  BENCH_RUNNERS: 2

name: bench

permissions: {}

jobs:
  reth-bench-ack:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && (startsWith(github.event.comment.body, '@decofe bench') || startsWith(github.event.comment.body, 'derek bench'))) ||
      github.event_name == 'workflow_dispatch'
    name: reth-bench-ack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      pr: ${{ steps.args.outputs.pr }}
      actor: ${{ steps.args.outputs.actor }}
      blocks: ${{ steps.args.outputs.blocks }}
      warmup: ${{ steps.args.outputs.warmup }}
      baseline: ${{ steps.args.outputs.baseline }}
      feature: ${{ steps.args.outputs.feature }}
      baseline-name: ${{ steps.args.outputs.baseline-name }}
      feature-name: ${{ steps.args.outputs.feature-name }}
      samply: ${{ steps.args.outputs.samply }}
      slack: ${{ steps.args.outputs.slack }}
      cores: ${{ steps.args.outputs.cores }}
      big-blocks: ${{ steps.args.outputs.big-blocks }}
      bal: ${{ steps.args.outputs.bal }}
      wait-time: ${{ steps.args.outputs.wait-time }}
      baseline-args: ${{ steps.args.outputs.baseline-args }}
      feature-args: ${{ steps.args.outputs.feature-args }}
      abba: ${{ steps.args.outputs.abba }}
      otlp: ${{ steps.args.outputs.otlp }}
      comment-id: ${{ steps.ack.outputs.comment-id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check org membership
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const request = require('./.github/scripts/bench-request.js');
            await request.checkOrgMembership({github, context, core});

      - name: Parse arguments
        id: args
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const request = require('./.github/scripts/bench-request.js');
            await request.parseArguments({github, context, core});

      - name: Acknowledge request
        id: ack
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const request = require('./.github/scripts/bench-request.js');
            await request.acknowledgeRequest({
              github,
              context,
              core,
              outputs: {
                pr: '${{ steps.args.outputs.pr }}',
                actor: '${{ steps.args.outputs.actor }}',
                blocks: '${{ steps.args.outputs.blocks }}',
                warmup: '${{ steps.args.outputs.warmup }}',
                'baseline-name': '${{ steps.args.outputs.baseline-name }}',
                'feature-name': '${{ steps.args.outputs.feature-name }}',
                samply: '${{ steps.args.outputs.samply }}',
                slack: '${{ steps.args.outputs.slack }}',
                cores: '${{ steps.args.outputs.cores }}',
                'big-blocks': '${{ steps.args.outputs.big-blocks }}',
                bal: '${{ steps.args.outputs.bal }}',
                'wait-time': '${{ steps.args.outputs.wait-time }}',
                'baseline-args': '${{ steps.args.outputs.baseline-args }}',
                'feature-args': '${{ steps.args.outputs.feature-args }}',
                abba: '${{ steps.args.outputs.abba }}',
                otlp: '${{ steps.args.outputs.otlp }}',
              },
            });

      - name: Poll queue position
        if: steps.ack.outputs.comment-id && steps.ack.outputs.queue-position != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const request = require('./.github/scripts/bench-request.js');
            await request.pollQueuePosition({
              github,
              context,
              core,
              commentId: '${{ steps.ack.outputs.comment-id }}',
              initialPosition: '${{ steps.ack.outputs.queue-position }}',
              outputs: {
                pr: '${{ steps.args.outputs.pr }}',
                actor: '${{ steps.args.outputs.actor }}',
                blocks: '${{ steps.args.outputs.blocks }}',
                warmup: '${{ steps.args.outputs.warmup }}',
                'baseline-name': '${{ steps.args.outputs.baseline-name }}',
                'feature-name': '${{ steps.args.outputs.feature-name }}',
                samply: '${{ steps.args.outputs.samply }}',
                slack: '${{ steps.args.outputs.slack }}',
                cores: '${{ steps.args.outputs.cores }}',
                'big-blocks': '${{ steps.args.outputs.big-blocks }}',
                bal: '${{ steps.args.outputs.bal }}',
                'wait-time': '${{ steps.args.outputs.wait-time }}',
                'baseline-args': '${{ steps.args.outputs.baseline-args }}',
                'feature-args': '${{ steps.args.outputs.feature-args }}',
                abba: '${{ steps.args.outputs.abba }}',
                otlp: '${{ steps.args.outputs.otlp }}',
              },
            });

  reth-bench:
    needs: reth-bench-ack
    name: bench-${{ needs.reth-bench-ack.outputs.big-blocks == 'true' && 'reth-bench' || 'txgen' }}
    runs-on: [self-hosted, Linux, X64, available]
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 120
    env:
      BENCH_RPC_URL: https://ethereum.reth.rs/rpc
      BENCH_TXGEN_RPC_URL: https://eth.llamarpc.com
      SCHELK_MOUNT: /reth-bench
      RETH_SCOPE: reth-bench.scope
      BENCH_WORK_DIR: ${{ github.workspace }}/bench-work
      BENCH_PR: ${{ needs.reth-bench-ack.outputs.pr }}
      BENCH_ACTOR: ${{ needs.reth-bench-ack.outputs.actor }}
      BENCH_BLOCKS: ${{ needs.reth-bench-ack.outputs.blocks }}
      BENCH_WARMUP_BLOCKS: ${{ needs.reth-bench-ack.outputs.warmup }}
      BENCH_SAMPLY: ${{ needs.reth-bench-ack.outputs.samply }}
      BENCH_CORES: ${{ needs.reth-bench-ack.outputs.cores }}
      BENCH_BIG_BLOCKS: ${{ needs.reth-bench-ack.outputs.big-blocks }}
      BENCH_BAL: ${{ needs.reth-bench-ack.outputs.bal }}
      BENCH_WAIT_TIME: ${{ needs.reth-bench-ack.outputs.wait-time }}
      BENCH_BASELINE_ARGS: ${{ needs.reth-bench-ack.outputs.baseline-args }}
      BENCH_FEATURE_ARGS: ${{ needs.reth-bench-ack.outputs.feature-args }}
      BENCH_ABBA: ${{ needs.reth-bench-ack.outputs.abba }}
      BENCH_OTLP: ${{ needs.reth-bench-ack.outputs.otlp }}
      BENCH_COMMENT_ID: ${{ needs.reth-bench-ack.outputs.comment-id }}
      BENCH_SLACK: ${{ needs.reth-bench-ack.outputs.slack }}
      BENCH_DRIVER: ${{ needs.reth-bench-ack.outputs.big-blocks == 'true' && 'reth-bench' || 'txgen' }}
      BENCH_NODE_BIN: ${{ needs.reth-bench-ack.outputs.big-blocks == 'true' && 'reth-bb' || 'reth' }}
      BENCH_METRICS_ADDR: "127.0.0.1:9100"
      TXGEN_REV: 420cad10ad2d1ffa10d5708a892a910e101d7811
      BENCH_OTLP_TRACES_ENDPOINT: ${{ needs.reth-bench-ack.outputs.otlp != 'false' && secrets.BENCH_OTLP_TRACES_ENDPOINT || '' }}
      BENCH_OTLP_LOGS_ENDPOINT: ${{ needs.reth-bench-ack.outputs.otlp != 'false' && secrets.BENCH_OTLP_LOGS_ENDPOINT || '' }}
    steps:
      - name: Clean up previous bench-work
        run: sudo rm -rf "$BENCH_WORK_DIR" 2>/dev/null || true

      - name: Resolve checkout ref
        id: checkout-ref
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const refs = require('./.github/scripts/bench-workflow-refs.js');
            await refs.resolveCheckoutRef({github, context, core});

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true
          fetch-depth: 0
          ref: ${{ steps.checkout-ref.outputs.ref }}

      - name: Resolve job URL and update status
        if: env.BENCH_COMMENT_ID
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const status = require('./.github/scripts/bench-job-status.js');
            await status.resolveJobUrlAndUpdateStatus({
              github,
              context,
              core,
              baselineName: '${{ needs.reth-bench-ack.outputs.baseline-name }}',
              featureName: '${{ needs.reth-bench-ack.outputs.feature-name }}',
            });

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
        continue-on-error: true
      - uses: astral-sh/setup-uv@bd01e18f51369d5a26f1651c3cb451d3417e3bba # v6.3.1

      - name: Install dependencies
        env:
          DEREK_TOKEN: ${{ secrets.DEREK_TOKEN }}
        run: .github/scripts/bench-install-dependencies.sh

      # Verify all required tools are available
      - name: Check dependencies
        run: .github/scripts/bench-check-dependencies.sh

      # Build binaries
      - name: Resolve PR head branch
        id: pr-info
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const refs = require('./.github/scripts/bench-workflow-refs.js');
            await refs.resolvePrInfo({github, context, core});

      - name: Resolve refs
        id: refs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const refs = require('./.github/scripts/bench-workflow-refs.js');
            await refs.resolveRefs({core});
        env:
          BASELINE_ARG: ${{ needs.reth-bench-ack.outputs.baseline }}
          FEATURE_ARG: ${{ needs.reth-bench-ack.outputs.feature }}
          PR_HEAD_SHA: ${{ steps.pr-info.outputs.head-sha }}
          PR_HEAD_REF: ${{ steps.pr-info.outputs.head-ref }}

      - name: Validate local big blocks
        if: env.BENCH_BIG_BLOCKS == 'true'
        id: big-blocks-check
        run: .github/scripts/bench-validate-big-blocks.sh

      - name: Validate local snapshot
        id: snapshot-check
        run: .github/scripts/bench-reth-snapshot.sh

      - name: Prepare source dirs
        env:
          BASELINE_REF: ${{ steps.refs.outputs.baseline-ref }}
          FEATURE_REF: ${{ steps.refs.outputs.feature-ref }}
        run: .github/scripts/bench-prepare-source-dirs.sh

      - name: Build binaries
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TXGEN_DEPLOY_KEY: ${{ secrets.TXGEN_DEPLOY_KEY }}
          TXGEN_TOKEN: ${{ secrets.TXGEN_TOKEN }}
          GH_PROJECT_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          DEREK_PAT: ${{ secrets.DEREK_PAT }}
          DEREK_TOKEN: ${{ secrets.DEREK_TOKEN }}
          BENCH_REPO: ${{ github.repository }}
          BASELINE_REF: ${{ steps.refs.outputs.baseline-ref }}
          FEATURE_REF: ${{ steps.refs.outputs.feature-ref }}
        run: .github/scripts/bench-build-binaries.sh

      # System tuning for reproducible benchmarks
      - name: System setup
        run: .github/scripts/bench-system-setup.sh

      # Clean up any leftover state
      - name: Pre-flight cleanup
        run: .github/scripts/bench-preflight-cleanup.sh

      - name: Start metrics proxy
        run: .github/scripts/bench-start-metrics-proxy.sh

      - name: Update status (running benchmarks)
        if: success() && env.BENCH_COMMENT_ID
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const s = require('./.github/scripts/bench-update-status.js');
            await s({github, context, status: 'Running benchmarks...'});

      # Interleaved run order (F-B-B-F) to reduce systematic bias from
      # thermal drift and cache warming.
      - name: "Run benchmark: feature (1/2)"
        id: run-feature-1
        env:
          FEATURE_REF: ${{ steps.refs.outputs.feature-ref }}
          OTEL_RESOURCE_ATTRIBUTES: "benchmark_id=${{ env.BENCH_ID }},benchmark_run=feature-1,run_type=feature,git_ref=${{ steps.refs.outputs.feature-ref }}"
        run: .github/scripts/bench-run-once.sh feature feature-1 "$FEATURE_REF" reth-feature

      - name: "Run benchmark: baseline (1/2)"
        id: run-baseline-1
        env:
          BASELINE_REF: ${{ steps.refs.outputs.baseline-ref }}
          OTEL_RESOURCE_ATTRIBUTES: "benchmark_id=${{ env.BENCH_ID }},benchmark_run=baseline-1,run_type=baseline,git_ref=${{ steps.refs.outputs.baseline-ref }}"
        run: .github/scripts/bench-run-once.sh baseline baseline-1 "$BASELINE_REF" reth-baseline

      - name: "Run benchmark: baseline (2/2)"
        if: env.BENCH_ABBA != 'false'
        id: run-baseline-2
        env:
          BASELINE_REF: ${{ steps.refs.outputs.baseline-ref }}
          OTEL_RESOURCE_ATTRIBUTES: "benchmark_id=${{ env.BENCH_ID }},benchmark_run=baseline-2,run_type=baseline,git_ref=${{ steps.refs.outputs.baseline-ref }}"
        run: .github/scripts/bench-run-once.sh baseline baseline-2 "$BASELINE_REF" reth-baseline

      - name: "Run benchmark: feature (2/2)"
        if: env.BENCH_ABBA != 'false'
        id: run-feature-2
        env:
          FEATURE_REF: ${{ steps.refs.outputs.feature-ref }}
          OTEL_RESOURCE_ATTRIBUTES: "benchmark_id=${{ env.BENCH_ID }},benchmark_run=feature-2,run_type=feature,git_ref=${{ steps.refs.outputs.feature-ref }}"
        run: .github/scripts/bench-run-once.sh feature feature-2 "$FEATURE_REF" reth-feature

      - name: Stop metrics proxy & generate Grafana URL
        id: metrics
        if: "!cancelled()"
        run: .github/scripts/bench-stop-metrics-grafana.sh

      - name: Scan logs for errors
        if: "!cancelled()"
        run: .github/scripts/bench-scan-logs.sh

      - name: Upload samply profiles
        if: success() && env.BENCH_SAMPLY == 'true'
        run: .github/scripts/bench-upload-samply.sh

      # Results & charts
      - name: Parse results
        id: results
        if: success()
        env:
          BASELINE_REF: ${{ steps.refs.outputs.baseline-ref }}
          BASELINE_NAME: ${{ steps.refs.outputs.baseline-name }}
          FEATURE_NAME: ${{ steps.refs.outputs.feature-name }}
          FEATURE_REF: ${{ steps.refs.outputs.feature-ref }}
          GRAFANA_URL: ${{ steps.metrics.outputs.grafana-url }}
        run: .github/scripts/bench-parse-results.sh

      - name: Generate charts
        if: success()
        env:
          BASELINE_NAME: ${{ steps.refs.outputs.baseline-name }}
          FEATURE_NAME: ${{ steps.refs.outputs.feature-name }}
        run: .github/scripts/bench-generate-charts.sh

      - name: Upload results
        if: "!cancelled()"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bench-results
          path: ${{ env.BENCH_WORK_DIR }}

      - name: Push charts
        id: push-charts
        if: success()
        env:
          DEREK_TOKEN: ${{ secrets.DEREK_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: .github/scripts/bench-push-charts.sh

      - name: Compare & comment
        if: success() && env.BENCH_COMMENT_ID
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const comment = require('./.github/scripts/bench-comment.js');
            await comment.compareAndComment({
              github,
              context,
              chartSha: '${{ steps.push-charts.outputs.sha }}',
              grafanaUrl: '${{ steps.metrics.outputs.grafana-url }}',
              runId: '${{ github.run_id }}',
            });

      - name: Write job summary
        if: success()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const jobSummary = require('./.github/scripts/bench-job-summary.js');
            await jobSummary({
              core,
              context,
              chartSha: '${{ steps.push-charts.outputs.sha }}',
              grafanaUrl: '${{ steps.metrics.outputs.grafana-url }}',
              runId: '${{ github.run_id }}',
            });

      - name: Send Slack notification (success)
        if: success() && (env.BENCH_SLACK == 'always' || env.BENCH_SLACK == 'on-win')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SLACK_BENCH_BOT_TOKEN: ${{ secrets.SLACK_BENCH_BOT_TOKEN }}
          SLACK_BENCH_CHANNEL: ${{ secrets.SLACK_BENCH_CHANNEL }}
        with:
          script: |
            const notify = require('./.github/scripts/bench-slack-notify.js');
            await notify.success({ core, context });

      - name: Update status (failed)
        if: failure() && env.BENCH_COMMENT_ID
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const abba = (process.env.BENCH_ABBA || 'true') !== 'false';
            const bigBlocks = process.env.BENCH_BIG_BLOCKS === 'true';
            const steps_status = [
              ...(bigBlocks ? [['validating local big-block data', '${{ steps.big-blocks-check.outcome }}']] : []),
              ['validating local snapshot', '${{ steps.snapshot-check.outcome }}'],
              ['building binaries', '${{ steps.build.outcome }}'],
              ['running feature benchmark (1/2)', '${{ steps.run-feature-1.outcome }}'],
              ['running baseline benchmark (1/2)', '${{ steps.run-baseline-1.outcome }}'],
              ...(abba ? [['running baseline benchmark (2/2)', '${{ steps.run-baseline-2.outcome }}']] : []),
              ...(abba ? [['running feature benchmark (2/2)', '${{ steps.run-feature-2.outcome }}']] : []),
            ];
            const failed = steps_status.find(([, o]) => o === 'failure');
            const failedStep = failed ? failed[0] : 'unknown step';
            const comment = require('./.github/scripts/bench-comment.js');
            await comment.updateFailed({github, context, failedStep});

      - name: Send Slack notification (failure)
        if: failure() && env.BENCH_SLACK != 'never' && env.BENCH_SLACK != 'on-win'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SLACK_BENCH_BOT_TOKEN: ${{ secrets.SLACK_BENCH_BOT_TOKEN }}
          SLACK_BENCH_CHANNEL: ${{ secrets.SLACK_BENCH_CHANNEL }}
        with:
          script: |
            const abba = (process.env.BENCH_ABBA || 'true') !== 'false';
            const bigBlocks = process.env.BENCH_BIG_BLOCKS === 'true';
            const steps_status = [
              ...(bigBlocks ? [['validating local big-block data', '${{ steps.big-blocks-check.outcome }}']] : []),
              ['validating local snapshot', '${{ steps.snapshot-check.outcome }}'],
              ['building binaries', '${{ steps.build.outcome }}'],
              ['running feature benchmark (1/2)', '${{ steps.run-feature-1.outcome }}'],
              ['running baseline benchmark (1/2)', '${{ steps.run-baseline-1.outcome }}'],
              ...(abba ? [['running baseline benchmark (2/2)', '${{ steps.run-baseline-2.outcome }}']] : []),
              ...(abba ? [['running feature benchmark (2/2)', '${{ steps.run-feature-2.outcome }}']] : []),
            ];
            const failed = steps_status.find(([, o]) => o === 'failure');
            const failedStep = failed ? failed[0] : 'unknown step';
            const notify = require('./.github/scripts/bench-slack-notify.js');
            await notify.failure({ core, context, failedStep });

      - name: Update status (cancelled)
        if: cancelled() && env.BENCH_COMMENT_ID
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const comment = require('./.github/scripts/bench-comment.js');
            await comment.updateCancelled({github, context});

      - name: Clean build outputs
        if: always()
        run: .github/scripts/bench-clean-build-outputs.sh

      - name: Restore system settings
        if: always()
        run: .github/scripts/bench-restore-system-settings.sh
