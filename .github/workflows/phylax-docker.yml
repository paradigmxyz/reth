# Builds and pushes the Phylax credible-reth Docker image to GHCR.
#
# Kept separate from docker.yml to avoid future conflicts
# with upstream on every reth rebase.

name: phylax-docker

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip pushing the image (dry run)"
        required: false
        type: boolean
        default: false


permissions: {}

jobs:
  build:
    name: Build and push phylax reth image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2.1.4
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ steps.app-token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get short SHA
        id: git
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
          build-args: |
            BINARY=reth
            MANIFEST_PATH=bin/reth
          tags: ghcr.io/${{ github.repository }}/reth:sha-${{ steps.git.outputs.short_sha }}
