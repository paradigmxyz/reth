name: grafana

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions: {}

jobs:
  changes:
    name: classify changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_grafana: ${{ steps.classify.outputs.run_grafana }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: classify
        run: python3 .github/scripts/ci-rules.py classify

  check-dashboard:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Skip dashboard check
        if: needs.changes.outputs.run_grafana != 'true'
        run: echo "Skipping dashboard check for change that does not affect Grafana dashboards"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: needs.changes.outputs.run_grafana == 'true'
        with:
          persist-credentials: false
      - name: Validate dashboard format
        if: needs.changes.outputs.run_grafana == 'true'
        run: |
          python3 -c "
          import json, sys
          with open('etc/grafana/dashboards/overview.json') as f:
              d = json.load(f)
          errors = []
          if '__inputs' not in d:
              errors.append('missing __inputs')
          if '__requires' not in d:
              errors.append('missing __requires')
          if d.get('id') is not None:
              errors.append('contains internal id field — use export-dashboard.py')
          if errors:
              for e in errors:
                  print(f'Error: {e}', file=sys.stderr)
              sys.exit(1)
          print('✓ overview.json is a valid exported dashboard')
          "

  grafana-success:
    name: grafana success
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, check-dashboard]
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
