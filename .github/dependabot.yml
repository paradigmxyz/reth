version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    cooldown:
      default-days: 7
    groups:
      ci-weekly:
        patterns:
          - '*'
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    cooldown:
      default-days: 7
    labels:
      - "A-dependencies"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 1
    groups:
      cargo-weekly:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["minor", "patch"]
